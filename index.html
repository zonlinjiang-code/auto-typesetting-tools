<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Auto-Typesetting tools</title>
  
<style>
:root {
  color-scheme: dark;
  --app-bg: #07090b;
  --panel: #14171b;
  --panel-soft: #1d2025;
  --panel-line: #252a31;
  --text: #eef0f1;
  --accent: #f0a018;
  --accent-soft: #40290c;
  --stage-bg: #050607;
  --box: rgba(224, 61, 61, .23);
  --box-strong: rgba(224, 61, 61, .42);
}

/* v2 layout overrides */
.workspace {
  grid-template-rows: minmax(0, 1fr);
}

.sidebar-title {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  gap: 10px;
  padding: 4px 2px 16px;
}

.sidebar-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}

.sidebar-brand .brand-mark {
  color: #fff;
  font-size: 22px;
  line-height: 1;
}

.sidebar-brand h1 {
  margin: 0;
  color: #f4f5f6;
  font-size: 24px;
  font-weight: 950;
  letter-spacing: 0;
  white-space: nowrap;
}

.sidebar-reset {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  min-width: 92px;
  height: 38px;
  padding: 0 13px;
  border: 1px solid #2d3239;
  border-radius: 9px;
  background: #202329;
  color: #f4f5f6;
  cursor: pointer;
  font-size: 16px;
  font-weight: 950;
}

.sidebar-reset:hover {
  background: #292d34;
}

.artboard-wrap {
  display: grid;
  justify-items: center;
  gap: 20px;
}

.artboard {
  width: min(var(--board-w, 58vw), calc(100vh - 170px));
  max-width: 920px;
  aspect-ratio: var(--board-ratio, 3 / 4);
}

.canvas-size-bar {
  display: grid;
  grid-template-columns: 1fr 1fr 1.1fr;
  gap: 10px;
  width: min(100%, 620px);
  padding: 14px;
  border: 1px solid #242931;
  border-radius: 14px;
  background: #14171b;
  box-shadow: 0 18px 42px rgba(0, 0, 0, .24);
}

.size-pill,
.size-preset {
  display: grid;
  align-items: center;
  min-height: 48px;
  border: 0;
  border-radius: 11px;
  background: #202329;
  color: #f4f5f6;
  font-weight: 900;
}

.size-pill {
  grid-template-columns: 34px minmax(0, 1fr) 30px;
  gap: 6px;
  padding: 0 12px;
}

.size-pill span,
.size-pill b {
  color: #a7adb5;
}

.size-pill input {
  min-width: 0;
  border: 0;
  outline: 0;
  background: transparent;
  color: #fff;
  text-align: center;
  font-size: 20px;
  font-weight: 950;
}

.size-preset {
  padding: 0 12px;
  outline: 0;
  font-size: 18px;
}

.toggle-row {
  grid-template-columns: 40px 48px 1fr 32px;
}

.bg-row {
  display: grid;
  grid-template-columns: 74px 32px 1fr 32px;
  align-items: center;
  gap: 8px;
  color: #747a82;
  font-size: 11px;
  font-weight: 900;
}

.bg-image-row {
  display: grid;
  grid-template-columns: 1fr 32px;
  gap: 8px;
  margin-top: 9px;
}

.upload-button {
  height: 34px;
  border: 0;
  border-radius: 7px;
  background: #202329;
  color: #b8bdc3;
  cursor: pointer;
  font-size: 12px;
  font-weight: 900;
}

.upload-button:hover {
  color: #fff;
  background: #292d34;
}

.bg-brightness-row {
  margin-top: 9px;
}

.checkbox-row {
  display: grid;
  grid-template-columns: 1fr 24px;
  align-items: center;
  gap: 8px;
  margin-top: 9px;
  color: #747a82;
  font-size: 11px;
  font-weight: 900;
}

.checkbox-row input {
  width: 18px;
  height: 18px;
  accent-color: var(--accent);
}

.round-action {
  display: grid;
  place-items: center;
  width: 32px;
  height: 32px;
  border: 0;
  border-radius: 50%;
  background: #202329;
  color: #aeb4bc;
  cursor: pointer;
  font-size: 15px;
  font-weight: 950;
}

.round-action:hover {
  color: #fff;
  background: #292d34;
}

.box-head-row {
  grid-template-columns: 1fr 44px 32px;
}

.box-control-row {
  grid-template-columns: 66px 30px 1fr;
}

.glyph {
  outline-offset: 0;
}

@media (max-width: 920px) {
  .canvas-size-bar {
    grid-template-columns: 1fr;
    width: min(88vw, 520px);
  }
}

* {
  box-sizing: border-box;
}

html,
body {
  height: 100%;
}

body {
  margin: 0;
  min-width: 320px;
  background: var(--app-bg);
  color: var(--text);
  font-family: Inter, "Segoe UI", "Microsoft YaHei UI", Arial, sans-serif;
}

button,
input,
textarea,
select {
  font: inherit;
}

button {
  color: inherit;
}

.app-shell {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 328px;
  height: 100vh;
  overflow: hidden;
  background: #090b0e;
}

.workspace {
  display: grid;
  grid-template-rows: 112px minmax(0, 1fr);
  min-width: 0;
  background: var(--stage-bg);
}

.app-topbar {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 14px;
  padding: 0 38px;
  background: #fff;
  color: #101012;
  border-bottom: 1px solid #e8e8e8;
}

.brand-mark {
  font-size: 38px;
  line-height: 1;
}

.app-topbar h1 {
  margin: 0;
  font-size: 40px;
  font-weight: 950;
  letter-spacing: 0;
}

.top-reset {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 9px;
  min-width: 150px;
  height: 62px;
  padding: 0 24px;
  border: 1px solid #dfe1e5;
  border-radius: 15px;
  background: #fff;
  color: #0f0f11;
  cursor: pointer;
  font-size: 29px;
  font-weight: 950;
  box-shadow: 0 1px 0 rgba(0, 0, 0, .02);
}

.top-reset:hover {
  background: #f8f8f8;
}

.stage-scroll {
  display: grid;
  place-items: center;
  width: 100%;
  height: 100%;
  overflow: auto;
  padding: 18px 18px 18px 22px;
  background:
    linear-gradient(90deg, rgba(255, 255, 255, .02), transparent 28%),
    var(--stage-bg);
}

.artboard-wrap {
  min-width: 680px;
  padding: 20px 40px;
  border-radius: 8px;
  background: #080a0c;
  box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .035);
}

.artboard {
  position: relative;
  width: min(58vw, 620px);
  min-width: 440px;
  aspect-ratio: 3 / 4;
  margin: auto;
  overflow: hidden;
  background: #fff;
  box-shadow: 0 28px 70px rgba(0, 0, 0, .35);
  transition: background-color .18s ease;
}

.glyph {
  position: absolute;
  display: grid;
  justify-items: start;
  align-items: center;
  height: .92em;
  color: #050505;
  font-family: Impact, Haettenschweiler, "Arial Black", sans-serif;
  font-weight: 900;
  font-feature-settings: "kern" 1;
  font-kerning: normal;
  font-variant-east-asian: normal;
  line-height: .85;
  cursor: grab;
  user-select: none;
  border: 1px solid var(--box);
  background: transparent;
  transform-origin: 50% 55%;
  transition:
    left .24s cubic-bezier(.22, .9, .2, 1),
    top .24s cubic-bezier(.22, .9, .2, 1),
    font-size .18s ease,
    color .18s ease,
    border-color .18s ease,
    background-color .18s ease,
    box-shadow .18s ease,
    transform .14s ease;
  will-change: left, top, transform;
}

.glyph:active {
  cursor: grabbing;
  border-color: var(--box-strong);
  z-index: 20;
}

.glyph.hidden-text {
  color: transparent !important;
}

.glyph.space-glyph {
  color: transparent !important;
  pointer-events: none;
}

.glyph.space-glyph::before,
.glyph.space-glyph::after {
  display: none !important;
}

.controls {
  overflow: auto;
  padding: 14px 12px 22px;
  border-left: 1px solid #20242a;
  background: var(--panel);
}

.panel-block {
  border-top: 1px solid var(--panel-line);
}

.panel-block:first-child {
  border-top: 0;
}

.block-heading {
  display: grid;
  grid-template-columns: 20px 1fr 16px;
  align-items: center;
  width: 100%;
  min-height: 42px;
  padding: 0 2px;
  border: 0;
  background: transparent;
  color: #f1f2f4;
  cursor: pointer;
  font-size: 14px;
  font-weight: 900;
  letter-spacing: 0;
  text-align: left;
}

.badge {
  display: grid;
  place-items: center;
  width: 16px;
  height: 16px;
  border-radius: 4px;
  background: var(--accent-soft);
  color: var(--accent);
  font-size: 11px;
  line-height: 1;
}

.chevron {
  color: #555b62;
  text-align: right;
}

.block-body {
  padding: 0 0 14px;
}

.compact-body {
  padding-bottom: 10px;
}

.panel-block.collapsed .block-body {
  display: none;
}

.textarea,
.select,
.hex-input,
.hex-pill {
  width: 100%;
  border: 1px solid transparent;
  border-radius: 7px;
  background: var(--panel-soft);
  color: #f4f4f1;
  outline: 0;
}

.select,
.hex-input,
.hex-pill {
  height: 34px;
  padding: 0 10px;
  font-size: 12px;
  font-weight: 800;
}

.textarea:focus,
.select:focus,
.hex-input:focus,
.hex-pill:focus {
  border-color: rgba(240, 160, 24, .55);
}

.textarea {
  display: block;
  min-height: 118px;
  padding: 10px;
  resize: vertical;
  font-size: 16px;
  font-weight: 900;
  line-height: 1.08;
}

.layout-tools {
  display: grid;
  grid-template-columns: 72px 1fr;
  gap: 8px;
  margin: 10px 0 0;
}

.grid-picker {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 5px;
  padding: 8px;
  border-radius: 7px;
  background: var(--panel-soft);
}

.grid-picker button {
  width: 14px;
  height: 14px;
  padding: 0;
  border: 0;
  border-radius: 50%;
  background: #4a5057;
  cursor: pointer;
}

.grid-picker button.active {
  background: var(--accent);
  box-shadow: 0 0 0 5px rgba(240, 160, 24, .15);
}

.free-button,
.icon-button,
.toggle,
.wide-button,
.mode-button {
  border: 0;
  border-radius: 7px;
  background: var(--panel-soft);
  color: #b8bdc3;
  cursor: pointer;
  font-size: 12px;
  font-weight: 900;
}

.free-button {
  min-height: 62px;
}

.free-button.active,
.toggle.active,
.mode-button.active {
  color: #ffb642;
  background: #39250d;
  box-shadow: inset 0 0 0 1px rgba(240, 160, 24, .42);
}

.free-button:hover,
.icon-button:hover,
.toggle:hover,
.wide-button:hover,
.mode-button:hover {
  color: #fff;
  background: #272b32;
}

.range-row {
  display: grid;
  grid-template-columns: 92px 1fr 52px;
  align-items: center;
  gap: 8px;
  min-height: 22px;
  color: #747a82;
  font-size: 11px;
  font-weight: 900;
}

.range-row output {
  color: var(--accent);
  text-align: right;
}

input[type="range"] {
  width: 100%;
  accent-color: var(--accent);
}

.swatches {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.swatch {
  display: flex;
  align-items: center;
  gap: 9px;
  min-height: 40px;
  padding: 0 10px;
  border: 0;
  border-radius: 8px;
  background: var(--panel-soft);
  color: #969ca3;
  cursor: pointer;
  font-size: 12px;
  font-weight: 900;
}

.swatch.active {
  color: #e9edf1;
  background: #35240e;
  box-shadow: inset 0 0 0 1px rgba(240, 160, 24, .5);
}

.swatch i {
  display: inline-flex;
}

.swatch i::before,
.swatch i::after {
  content: "";
  width: 15px;
  height: 15px;
  border-radius: 50%;
}

.swatch i::before {
  background: var(--a);
}

.swatch i::after {
  margin-left: -3px;
  background: var(--b);
}

.color-row,
.toggle-row {
  display: grid;
  align-items: center;
  gap: 8px;
  margin-top: 10px;
  color: #747a82;
  font-size: 11px;
  font-weight: 900;
}

.color-row {
  grid-template-columns: 40px 32px 1fr 32px;
}

.toggle-row {
  grid-template-columns: 40px 48px 1fr;
}

input[type="color"] {
  width: 30px;
  height: 30px;
  padding: 0;
  border: 0;
  border-radius: 50%;
  overflow: hidden;
  background: transparent;
}

.hex-input {
  min-width: 0;
  text-transform: lowercase;
}

.icon-button,
.toggle {
  height: 32px;
}

.box-head-row {
  display: grid;
  grid-template-columns: 1fr 44px 32px;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
  color: #6f747b;
  font-size: 11px;
  font-weight: 900;
}

.box-control-row {
  display: grid;
  grid-template-columns: 48px 48px 38px 30px 1fr;
  align-items: center;
  gap: 6px;
  margin-top: 7px;
}

.mode-button {
  height: 30px;
  padding: 0 7px;
}

.mode-button.disabled {
  cursor: default;
  color: #4f555d;
  background: #191c21;
}

.round-color {
  width: 26px !important;
  height: 26px !important;
}

.hex-pill {
  height: 30px;
  min-width: 0;
  padding: 0 8px;
  text-transform: lowercase;
}

.box-range {
  grid-template-columns: 92px 1fr 52px;
  margin-top: 7px;
}

.export-panel .block-heading {
  min-height: 50px;
  font-size: 22px;
}

.export-badge {
  width: 24px;
  height: 24px;
  border-radius: 7px;
  font-size: 17px;
}

.export-scale {
  display: grid;
  grid-template-columns: 58px 1fr;
  align-items: center;
  margin-bottom: 16px;
  color: #696e75;
  font-size: 16px;
  font-weight: 900;
}

.scale-buttons {
  display: flex;
  gap: 8px;
}

.scale-buttons button,
.export-action {
  border: 1px solid #2d3239;
  border-radius: 8px;
  background: #202329;
  color: #898e96;
  cursor: pointer;
  font-size: 16px;
  font-weight: 900;
}

.scale-buttons button {
  min-width: 48px;
  height: 40px;
}

.scale-buttons button.active {
  color: #ffb12a;
  background: #37250d;
  border-color: #b67913;
}

.export-actions {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
}

.export-action {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 9px;
  height: 42px;
}

.export-action:hover {
  color: #eef0f2;
  background: #282c33;
}

.export-action span {
  color: #9da3aa;
  font-size: 19px;
  line-height: 1;
}

.export-action.muted {
  cursor: default;
}

@media (max-width: 920px) {
  .app-shell {
    grid-template-columns: 1fr;
    grid-template-rows: minmax(560px, 1fr) auto;
    overflow: auto;
  }

  .workspace {
    grid-template-rows: 92px minmax(0, 1fr);
  }

  .app-topbar {
    padding: 0 18px;
    gap: 10px;
  }

  .brand-mark {
    font-size: 30px;
  }

  .app-topbar h1 {
    font-size: 30px;
  }

  .top-reset {
    min-width: 118px;
    height: 50px;
    border-radius: 12px;
    font-size: 22px;
  }

  .stage-scroll {
    min-height: 60vh;
    padding: 12px;
    place-items: start center;
  }

  .artboard-wrap {
    min-width: 0;
    width: 100%;
    padding: 16px;
  }

  .artboard {
    width: min(88vw, 520px);
    min-width: 280px;
  }

  .controls {
    border-left: 0;
    border-top: 1px solid #20242a;
  }
}

}

          <label class="range-row font-range-row"><span>Height 行距</span><input id="lineHeightControl" type="range" min="70" max="160" value="112"><span class="number-unit"><input id="lineHeightValue" class="number-pill" type="number" min="70" max="160" value="112" step="1"><b>px</b></span></label>

      <section class="panel-block">
        <button class="block-heading" type="button" data-collapse="colorPanel"><span class="badge">●</span><span>Text Color 文字颜色</span><span class="chevron">▾</span></button>

          <div class="text-color-tools" id="textColorTools">
            <button id="textInkToggle" class="text-color-action active" type="button"><i style="--front:#050505;--back:#fff"></i>黑/白</button>
            <label class="text-color-picker"><input id="textColorPicker" class="round-color" type="color" value="#050505"><input id="textColorHex" class="hex-pill" value="#050505"></label>
            <button id="autoTextColor" class="text-color-action" type="button" title="根据背景自动推荐文字颜色"><i style="--front:#ffffff;--back:#1f8cff"></i><span>推荐色</span></button>

            <label class="range-row shadow-control-row"><span>羽化</span><input id="shadowBlur" type="range" min="0" max="80" value="2" step="1"><span class="number-unit"><input id="shadowBlurValue" class="number-pill" type="number" min="0" max="80" value="2" step="1"><b>px</b></span></label>

        </div>

      <section class="panel-block">

        </div>
      </section>

        </div>
      </section>

function snapshotState() {
  return {
    ...state,
    manual: Array.from(state.manual.entries())
  };
}

function pushHistory() {
  if (restoring) return;
  history.push(snapshotState());
  if (history.length > 80) history.shift();
}

function restoreSnapshot(snapshot) {
  if (!snapshot) return;
  restoring = true;
  Object.assign(state, snapshot);
  state.manual = new Map(snapshot.manual || []);
  state.selectedGlyphIds = Array.isArray(snapshot.selectedGlyphIds)
    ? snapshot.selectedGlyphIds
    : (snapshot.selectedGlyphId ? [snapshot.selectedGlyphId] : []);
  state.selectedGlyphId = state.selectedGlyphIds[0] || "";
  syncFormFromState();
  updateBoardSize();
  syncValues();
  syncButtons();
  draw();
  restoring = false;
}

function undo() {
  restoreSnapshot(history.pop());
}

function containsHan(text) {
  return /[\u3400-\u9fff\uf900-\ufaff]/u.test(text || "");
}

function isSpaceToken(token) {
  return /^[ \t]+$/.test(token || "");
}

function isOpeningPunctuation(token) {
  return /^[“‘"'([{（【《〈「『]$/u.test(token || "");
}

function isClosingPunctuation(token) {
  return /^[”’"')\]}）】》〉」』，。；;、,.!?！？：:…]$/u.test(token || "");
}

function isConnectorPunctuation(token) {
  return /^[+\-*/\\=~_&@#%·•]$/u.test(token || "");
}

function isPunctuationToken(token) {
  return isOpeningPunctuation(token) || isClosingPunctuation(token) || isConnectorPunctuation(token);
}

function isLatinWordToken(token) {
  return /^[A-Za-z0-9]+(?:[-_'][A-Za-z0-9]+)*[-_/]?$/u.test(token || "");
}

function tokenKind(token) {
  if (isSpaceToken(token)) return "space";
  if (containsHan(token)) return "cjk";
  if (isLatinWordToken(token)) return "latin";
  if (isPunctuationToken(token) || isEllipsisToken(token)) return "punct";
  return isLatinToken(token) ? "latin" : "cjk";
}

function isEllipsisToken(token) {
  return /^[.。…]{2,}$/u.test(token || "");
}

function mergeAttachedPunctuation(tokens) {
  const merged = [];
  tokens.forEach((token) => {
    if (!merged.length) {
      merged.push(token);
      return;
    }
    const previous = merged[merged.length - 1];
    if (isClosingPunctuation(token) && !isSpaceToken(previous)) {
      merged[merged.length - 1] = previous + token;
      return;
    }
    if (isOpeningPunctuation(previous) && !isSpaceToken(token)) {
      merged[merged.length - 1] = previous + token;
      return;
    }
    if ((token === "-" || token === "_" || token === "/" || token === "\\") && /^[A-Za-z0-9]+$/u.test(previous)) {
      merged[merged.length - 1] = previous + token;
      return;
    }
    merged.push(token);
  });
  return merged;
}

function tokenizeLine(line) {
  const raw = line.match(/ {1,}|\t+|\d+(?:\.\d+)?(?:px|pt|%)?|[A-Za-z]+(?:[-_'][A-Za-z0-9]+)*|[\u2e80-\u9fff\uf900-\ufaff]|\.{2,}|。{2,}|…{1,2}|[“”‘’"'()（）[\]{}【】《》〈〉「」『』，。；;、,.!?！？：:+\-*/\\=~_&@#%·•]|[^\s]/gu) || [];
  const tokens = [];
  for (let i = 0; i < raw.length; i += 1) {
    let token = raw[i];
    if (/^[.。…]+$/u.test(token)) {
      while (/^[.。…]+$/u.test(raw[i + 1] || "")) {
        token += raw[i + 1];
        i += 1;
      }
      tokens.push(token);
      continue;
    }
    tokens.push(token);
  }
  return mergeAttachedPunctuation(tokens);
}

function cleanLines(text) {
  const lines = text.split(/\r?\n/).map(tokenizeLine);
  return lines.some((line) => line.length) ? lines : [[]];
}

function anchorParts(anchor) {
  const col = anchor % 3;
  const row = Math.floor(anchor / 3);
  return {
    x: col === 0 ? "start" : col === 1 ? "center" : "end",
    y: row === 0 ? "start" : row === 1 ? "center" : "end"
  };
}

function randomColor() {
  const hue = Math.floor(Math.random() * 360);
  const sat = 68 + Math.floor(Math.random() * 26);
  const light = 44 + Math.floor(Math.random() * 18);
  const temp = document.createElement("span");
  temp.style.color = `hsl(${hue} ${sat}% ${light}%)`;
  document.body.append(temp);
  const rgb = getComputedStyle(temp).color.match(/\d+/g).map(Number);
  temp.remove();
  return `#${rgb.map((value) => value.toString(16).padStart(2, "0")).join("")}`;
}

    if (customFontFace) document.fonts.delete(customFontFace);
    customFontFace = face;
    customFontDataUrl = dataUrl;

    state.customFontName = displayName;
    state.customFontRole = inferCustomFontRole(file.name);
    state.fontFamily = state.customFontFamily;
    state.fontWeight = 700;

}

function clearSelectionState() {
  setSelectedGlyphIds([]);
}

function syncGlyphSelectionClasses() {
  const selected = new Set(getSelectedGlyphIds());
  els.artboard.querySelectorAll(".glyph").forEach((glyph) => {
    glyph.classList.toggle("selected", selected.has(glyph.dataset.id));
  });
}

function ensureGlyphManual(glyph) {
  if (!glyph) return null;
  const id = glyph.dataset.id;
  const current = state.manual.get(id) || {};
  const next = {
    ...current,
    x: current.x ?? parseFloat(glyph.style.left),
    y: current.y ?? parseFloat(glyph.style.top),
    scale: current.scale ?? (Number(glyph.dataset.scale) || 1)
  };
  state.manual.set(id, next);
  return next;
}

function setSelection(ids, redraw = true) {
  setSelectedGlyphIds(ids);
  getSelectedGlyphIds().forEach((id) => ensureGlyphManual(els.artboard.querySelector(`.glyph[data-id="${id}"]`)));
  state.free = Boolean(getSelectedGlyphIds().length) || state.free;
  syncValues();
  syncButtons();
  if (redraw) draw();
  else {
    syncGlyphSelectionClasses();
    updateSelectionBounds();
  }
}

function toggleGlyphSelection(glyph) {
  const id = glyph.dataset.id;
  const current = new Set(getSelectedGlyphIds());
  if (current.has(id)) current.delete(id);
  else current.add(id);
  setSelection(Array.from(current));
}

function glyphIntersectsRect(glyph, rect) {
  const left = parseFloat(glyph.style.left);
  const top = parseFloat(glyph.style.top);
  const right = left + glyph.offsetWidth;
  const bottom = top + glyph.offsetHeight;
  return right >= rect.left && left <= rect.right && bottom >= rect.top && top <= rect.bottom;
}

function updateSelectionBounds() {
  els.artboard.querySelectorAll(".selection-bounds").forEach((item) => item.remove());
  const glyphs = getSelectedGlyphIds()
    .map((id) => els.artboard.querySelector(`.glyph[data-id="${id}"]`))
    .filter(Boolean);
  if (!glyphs.length) return;
  const rects = glyphs.map((glyph) => ({
    left: parseFloat(glyph.style.left),
    top: parseFloat(glyph.style.top),
    right: parseFloat(glyph.style.left) + glyph.offsetWidth,
    bottom: parseFloat(glyph.style.top) + glyph.offsetHeight
  }));
  const pad = 8;
  const left = Math.max(0, Math.min(...rects.map((rect) => rect.left)) - pad);
  const top = Math.max(0, Math.min(...rects.map((rect) => rect.top)) - pad);
  const right = Math.min(els.artboard.clientWidth, Math.max(...rects.map((rect) => rect.right)) + pad);
  const bottom = Math.min(els.artboard.clientHeight, Math.max(...rects.map((rect) => rect.bottom)) + pad);
  const bounds = document.createElement("div");
  bounds.className = "selection-bounds";
  bounds.style.left = `${left}px`;
  bounds.style.top = `${top}px`;
  bounds.style.width = `${Math.max(1, right - left)}px`;
  bounds.style.height = `${Math.max(1, bottom - top)}px`;
  els.artboard.append(bounds);
}

function appendVignetteLayer() {
  if (!state.vignetteEnabled || state.transparentBg) return;
  const vignette = document.createElement("div");
  vignette.className = "vignette-layer";
  vignette.style.setProperty("--vignette-opacity", String(clamp(state.vignetteStrength, 0, 80) / 100));
  els.artboard.append(vignette);
}

function appendCutoutLayer() {
  if (!state.cutoutEnabled || !state.cutoutImage || state.transparentBg) return;
  const cutout = document.createElement("img");
  cutout.className = "subject-cutout-layer";
  cutout.alt = "";
  cutout.src = state.cutoutImage;
  els.artboard.append(cutout);
}

function draw() {
  const layout = measureLayout();
  const box = textBoxStyles();
  const shadow = textShadowSettings();
  const showImage = Boolean(state.bgImage) && state.bgImageEnabled && !state.transparentBg;
  els.artboard.replaceChildren();
  els.artboard.style.backgroundRepeat = "repeat";
  els.artboard.style.backgroundPosition = "center center";
  if (state.transparentBg) {
    els.artboard.style.backgroundColor = "#ffffff";
    els.artboard.style.backgroundImage = "repeating-conic-gradient(#cccccc 0 25%, #ffffff 0 50%)";
    els.artboard.style.backgroundSize = "12px 12px";
  } else {
    els.artboard.style.backgroundColor = state.bg;
    els.artboard.style.backgroundImage = "";
    els.artboard.style.backgroundSize = "";
    if (showImage) {
      const bg = document.createElement("img");
      bg.className = "bg-image-layer";
      bg.alt = "";
      bg.src = state.bgImage;
      bg.style.left = `${50 + state.bgImageX / 2}%`;
      bg.style.top = `${50 + state.bgImageY / 2}%`;
      bg.style.transform = `translate(-50%, -50%) scale(${state.bgImageScale / 100})`;
      bg.style.filter = `brightness(${state.bgBrightness}%)`;
      els.artboard.append(bg);
    }
  }
  appendVignetteLayer();
  document.documentElement.style.setProperty("--box", themes.custom?.box || "rgba(224, 61, 61, .23)");
  let index = 0;
  const selectedIds = getSelectedGlyphIds();
  layout.rows.forEach((row, rowIndex) => {
    const rowScale = layout.rowScales[rowIndex] || 1;
    const rowW = layout.rowWidths[rowIndex];
    const rowVisualLeft = (layout.rowVisualLefts?.[rowIndex] || 0) * rowScale;
    const rowOffset = layout.anchor.x === "start" ? 0 : layout.anchor.x === "center" ? (layout.maxRowWidth - rowW) / 2 : layout.maxRowWidth - rowW;
    let cursorX = layout.startX + rowOffset - rowVisualLeft;
    row.forEach((token, tokenIndex) => {
      const glyph = document.createElement("span");
      const id = String(index);
      const manual = state.manual.get(id);
      const scale = manual?.scale ?? 1;
      const glyphSize = layout.renderSize * rowScale * scale;
      const glyphFamily = fontFamilyForChar(token);
      const glyphBox = measureGlyphBox(token, glyphSize, glyphFamily);
      const lineBox = layout.renderSize * rowScale;
      const opticalOffset = glyphBox.visualLeft ? -glyphBox.visualLeft : 0;
      const x = manual?.x ?? (cursorX + opticalOffset);
      const y = manual?.y ?? layout.startY + rowIndex * layout.linePx + Math.max(0, (lineBox - glyphBox.height) / 2);
      glyph.className = `glyph${state.textVisible ? "" : " hidden-text"}${selectedIds.includes(id) ? " selected" : ""}`;
      if (isSpaceToken(token)) glyph.classList.add("space-glyph");
      glyph.textContent = token;
      glyph.dataset.id = id;
      glyph.dataset.char = token;
      glyph.dataset.scale = String(scale);
      glyph.style.left = `${x}px`;
      glyph.style.top = `${y}px`;
      glyph.style.fontSize = `${glyphSize}px`;
      glyph.style.fontFamily = glyphFamily;
      glyph.style.fontWeight = String(state.fontWeight);
      glyph.style.setProperty("--glyph-weight", String(state.fontWeight));
      glyph.style.color = state.textColor;
      glyph.style.width = `${glyphBox.width}px`;
      glyph.style.height = `${glyphBox.height}px`;
      glyph.style.paddingLeft = `${glyphBox.visualLeft || 0}px`;
      glyph.style.paddingRight = `${Math.max(0, glyphBox.width - (glyphBox.visualRight || glyphBox.width))}px`;
      glyph.style.setProperty("--glyph-fill-w", `${glyphBox.width}px`);
      glyph.style.setProperty("--glyph-fill-h", `${glyphBox.height}px`);
      glyph.style.setProperty("--box-fill", box.fill);
      glyph.style.setProperty("--text-stroke", box.stroke);
      glyph.style.setProperty("--text-stroke-width", box.strokeWidth + "px");
      glyph.style.setProperty("--text-shadow", shadow.css);
      if (state.live) {
        const wave = Math.sin(state.tick / 12 + index * 0.75);
        const skew = Math.cos(state.tick / 15 + index * 0.37) * 7;
        glyph.style.transform = glyphTransform(`translateY(${wave * 5}px) skewX(${skew}deg) scale(${1 + wave * 0.045})`);
      } else {
        glyph.style.transform = glyphTransform();
      }
      if (!glyph.classList.contains("space-glyph")) {
        glyph.addEventListener("pointerdown", startDrag);
        glyph.addEventListener("wheel", resizeGlyphByWheel, { passive: false });
      }
      els.artboard.append(glyph);
      const nextToken = row[tokenIndex + 1];
      const nextGap = nextToken ? layoutGapBefore(row.slice(0, tokenIndex + 1), nextToken, layout.tokenGap, layout.renderSize) : 0;
      cursorX += ((layout.rowTokenWidths[rowIndex][tokenIndex] || glyphBox.width) + nextGap) * rowScale;
      index += 1;
    });
  });
  appendCutoutLayer();
  updateSelectionBounds();
}

function selectGlyph(glyph) {
  setSelection([glyph.dataset.id], false);
}

function setSelectedGlyphScale(percent) {
  const nextScale = clamp(percent / 100, 0.1, 5);
  const ids = getSelectedGlyphIds();
  if (!ids.length) return;
  ids.forEach((id) => {
    const glyph = els.artboard.querySelector(`.glyph[data-id="${id}"]`);
    const current = glyph ? ensureGlyphManual(glyph) : state.manual.get(id);
    if (!current || !glyph) return;
    const oldScale = Number(glyph.dataset.scale) || current.scale || 1;
    const baseSize = parseFloat(glyph.style.fontSize) / oldScale;
    const centerX = current.x + glyph.offsetWidth / 2;
    const centerY = current.y + glyph.offsetHeight / 2;
    const nextBox = measureGlyphBox(glyph.dataset.char, baseSize * nextScale, fontFamilyForChar(glyph.dataset.char));
    state.manual.set(id, {
      ...current,
      x: centerX - nextBox.width / 2,
      y: centerY - nextBox.height / 2,
      scale: nextScale
    });
  });
  state.free = true;
  syncValues();
  syncButtons();
  draw();
}
function resizeGlyphByWheel(event) {
  if (!event.shiftKey && !event.altKey) return;
  event.preventDefault();
  const glyph = event.currentTarget;
  const id = glyph.dataset.id;
  const current = state.manual.get(id) || {
    x: parseFloat(glyph.style.left),
    y: parseFloat(glyph.style.top),
    scale: Number(glyph.dataset.scale) || 1
  };
  state.manual.set(id, current);
  if (!getSelectedGlyphIds().includes(id)) selectGlyph(glyph);
  pushHistory();
  const step = event.deltaY < 0 ? 0.06 : -0.06;
  setSelectedGlyphScale(Math.round(clamp((current.scale || 1) + step, 0.1, 5) * 100));
}

function startDrag(event) {
  const glyph = event.currentTarget;
  if (event.shiftKey || event.ctrlKey || event.metaKey) {
    event.preventDefault();
    pushHistory();
    toggleGlyphSelection(glyph);
    return;
  }
  const id = glyph.dataset.id;
  if (!getSelectedGlyphIds().includes(id)) selectGlyph(glyph);
  const selectedGlyphs = getSelectedGlyphIds()
    .map((selectedId) => els.artboard.querySelector(`.glyph[data-id="${selectedId}"]`))
    .filter(Boolean);
  selectedGlyphs.forEach(ensureGlyphManual);
  selectedGlyphs.forEach((item) => item.classList.add("dragging"));
  els.artboard.querySelectorAll(".selection-bounds").forEach((item) => item.remove());
  const board = els.artboard.getBoundingClientRect();
  const start = {
    x: event.clientX,
    y: event.clientY,
    items: selectedGlyphs.map((item) => ({
      id: item.dataset.id,
      glyph: item,
      left: parseFloat(item.style.left),
      top: parseFloat(item.style.top),
      width: item.offsetWidth,
      height: item.offsetHeight
    }))
  };
  try { glyph.setPointerCapture(event.pointerId); } catch (error) {}

  function move(moveEvent) {
    const dx = moveEvent.clientX - start.x;
    const dy = moveEvent.clientY - start.y;
    const minDx = Math.min(...start.items.map((item) => -item.left));
    const maxDx = Math.min(...start.items.map((item) => board.width - item.left - item.width));
    const minDy = Math.min(...start.items.map((item) => -item.top));
    const maxDy = Math.min(...start.items.map((item) => board.height - item.top - item.height));
    const nextDx = clamp(dx, minDx, maxDx);
    const nextDy = clamp(dy, minDy, maxDy);
    start.items.forEach((item) => {
      const previous = state.manual.get(item.id) || {};
      const next = {
        ...previous,
        x: item.left + nextDx,
        y: item.top + nextDy
      };
      state.manual.set(item.id, next);
      item.glyph.style.left = `${next.x}px`;
      item.glyph.style.top = `${next.y}px`;
    });
  }

  function up(upEvent) {
    try { if (glyph.hasPointerCapture(upEvent.pointerId)) glyph.releasePointerCapture(upEvent.pointerId); } catch (error) {}
    selectedGlyphs.forEach((item) => item.classList.remove("dragging"));
    updateSelectionBounds();
    window.removeEventListener("pointermove", move);
    window.removeEventListener("pointerup", up);
  }

  window.addEventListener("pointermove", move);
  window.addEventListener("pointerup", up);
}

function startMarqueeSelection(event) {
  if (event.button !== 0 || event.target !== els.artboard) return;
  const board = els.artboard.getBoundingClientRect();
  const startX = clamp(event.clientX - board.left, 0, board.width);
  const startY = clamp(event.clientY - board.top, 0, board.height);
  const marquee = document.createElement("div");
  marquee.className = "selection-marquee";
  marquee.style.left = `${startX}px`;
  marquee.style.top = `${startY}px`;
  marquee.style.width = "0px";
  marquee.style.height = "0px";
  els.artboard.append(marquee);
  let didDrag = false;

  function move(moveEvent) {
    const currentX = clamp(moveEvent.clientX - board.left, 0, board.width);
    const currentY = clamp(moveEvent.clientY - board.top, 0, board.height);
    const left = Math.min(startX, currentX);
    const top = Math.min(startY, currentY);
    const width = Math.abs(currentX - startX);
    const height = Math.abs(currentY - startY);
    didDrag = didDrag || width > 4 || height > 4;
    marquee.style.left = `${left}px`;
    marquee.style.top = `${top}px`;
    marquee.style.width = `${width}px`;
    marquee.style.height = `${height}px`;
    if (!didDrag) return;
    const rect = { left, top, right: left + width, bottom: top + height };
    const ids = Array.from(els.artboard.querySelectorAll(".glyph"))
      .filter((glyph) => glyphIntersectsRect(glyph, rect))
      .map((glyph) => glyph.dataset.id);
    setSelectedGlyphIds(ids);
    els.artboard.querySelectorAll(".glyph").forEach((glyph) => {
      glyph.classList.toggle("selected", ids.includes(glyph.dataset.id));
    });
    syncValues();
    syncButtons();
  }

  function up() {
    window.removeEventListener("pointermove", move);
    window.removeEventListener("pointerup", up);
    marquee.remove();
    if (!didDrag) {
      if (getSelectedGlyphIds().length) {
        clearSelectionState();
        syncValues();
        syncButtons();
        draw();
      }
      return;
    }
    const ids = getSelectedGlyphIds();
    ids.forEach((id) => ensureGlyphManual(els.artboard.querySelector(`.glyph[data-id="${id}"]`)));
    state.free = Boolean(ids.length) || state.free;
    draw();
  }

  window.addEventListener("pointermove", move);
  window.addEventListener("pointerup", up);
}

function hexToRgb(hex) {
  const clean = hex.replace("#", "");
  return [0, 2, 4].map((i) => parseInt(clean.slice(i, i + 2), 16));
}

function rgbToHex(r, g, b) {
  return "#" + [r, g, b].map((value) => clamp(Math.round(value), 0, 255).toString(16).padStart(2, "0")).join("");
}

function luminance(hex) {
  const [r, g, b] = hexToRgb(hex).map((value) => {
    const c = value / 255;
    return c <= 0.03928 ? c / 12.92 : ((c + 0.055) / 1.055) ** 2.4;
  });
  return 0.2126 * r + 0.7152 * g + 0.0722 * b;
}

function rgbToHsl(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  const max = Math.max(r, g, b), min = Math.min(r, g, b);
  let h = 0, s = 0;
  const l = (max + min) / 2;
  if (max !== min) {
    const d = max - min;
    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
    if (max === r) h = (g - b) / d + (g < b ? 6 : 0);
    else if (max === g) h = (b - r) / d + 2;
    else h = (r - g) / d + 4;
    h *= 60;
  }
  return [h, s, l];
}

function hslToHex(h, s, l) {
  h = ((h % 360) + 360) % 360;
  s /= 100; l /= 100;
  const c = (1 - Math.abs(2 * l - 1)) * s;
  const x = c * (1 - Math.abs((h / 60) % 2 - 1));
  const m = l - c / 2;
  let r = 0, g = 0, b = 0;
  if (h < 60) [r, g, b] = [c, x, 0];
  else if (h < 120) [r, g, b] = [x, c, 0];
  else if (h < 180) [r, g, b] = [0, c, x];
  else if (h < 240) [r, g, b] = [0, x, c];
  else if (h < 300) [r, g, b] = [x, 0, c];
  else [r, g, b] = [c, 0, x];
  return "#" + [r, g, b].map((value) => Math.round((value + m) * 255).toString(16).padStart(2, "0")).join("");
}

function colorDistance(a, b) {
  return Math.hypot(a[0] - b[0], a[1] - b[1], a[2] - b[2]);
}

function contrastRatio(colorA, colorB) {
  const a = luminance(colorA);
  const b = luminance(colorB);
  const lighter = Math.max(a, b);
  const darker = Math.min(a, b);
  return (lighter + 0.05) / (darker + 0.05);
}

function averageSampleColor(data, width, height, points) {
  let r = 0, g = 0, b = 0, count = 0;
  points.forEach(([px, py]) => {
    const x = clamp(Math.round(px * (width - 1)), 0, width - 1);
    const y = clamp(Math.round(py * (height - 1)), 0, height - 1);
    const index = (y * width + x) * 4;
    r += data[index];
    g += data[index + 1];
    b += data[index + 2];
    count += 1;
  });
  return [Math.round(r / count), Math.round(g / count), Math.round(b / count)];
}

async function analyzeAutoMatchBase() {
  if (!state.bgImage || !state.bgImageEnabled || state.transparentBg) {
    const rgb = hexToRgb(state.bg);
    return {
      overall: rgb,
      textZone: rgb,
      edge: rgb
    };
  }
  const image = await loadImage(state.bgImage);
  const canvas = document.createElement("canvas");
  const size = 64;
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext("2d");
  const rect = coverRect(image, size, size);
  ctx.fillStyle = state.bg;
  ctx.fillRect(0, 0, size, size);
  ctx.filter = `brightness(${state.bgBrightness}%)`;
  ctx.drawImage(image, rect.x, rect.y, rect.width, rect.height);
  ctx.filter = "none";
  const data = ctx.getImageData(0, 0, size, size).data;
  const overallPoints = [];
  for (let y = 0; y < size; y += 4) {
    for (let x = 0; x < size; x += 4) overallPoints.push([x / (size - 1), y / (size - 1)]);
  }
  return {
    overall: averageSampleColor(data, size, size, overallPoints),
    textZone: averageSampleColor(data, size, size, [
      [0.22, 0.16], [0.5, 0.16], [0.78, 0.16],
      [0.22, 0.34], [0.5, 0.34], [0.78, 0.34],
      [0.35, 0.54], [0.65, 0.54]
    ]),
    edge: averageSampleColor(data, size, size, [
      [0.04, 0.04], [0.5, 0.04], [0.96, 0.04],
      [0.04, 0.5], [0.96, 0.5],
      [0.04, 0.96], [0.5, 0.96], [0.96, 0.96]
    ])
  };
}

function buildAutoMatchRecommendations(base) {
  const [h, s, l] = rgbToHsl(...base.textZone);
  const [overallH, overallS, overallL] = rgbToHsl(...base.overall);
  const darkScene = l < 0.46;
  const warmScene = h < 70 || h > 315;
  const vivid = Math.max(64, Math.round(Math.max(s, overallS) * 100 + 18));
  const coverAccent = darkScene
    ? (warmScene ? "#d8f2ff" : "#ffe35a")
    : "#111315";
  const complement = hslToHex(h + 178, clamp(vivid, 62, 92), darkScene ? 76 : 28);
  const soft = darkScene
    ? hslToHex(overallH + (warmScene ? 205 : 34), 70, 86)
    : hslToHex(overallH + 180, 48, 22);
  const candidates = [
    { label: "推荐 1", color: coverAccent, role: "高对比" },
    { label: "推荐 2", color: complement, role: "互补" },
    { label: "推荐 3", color: soft, role: "柔和" },
    { label: "推荐 1", color: darkScene ? "#ffffff" : "#050505", role: "黑白" },
    { label: "推荐 2", color: "#ff4fb8", role: "潮流" },
    { label: "推荐 3", color: "#79f2c6", role: "清亮" }
  ];
  const bgHex = rgbToHex(...base.textZone);
  const unique = [];
  candidates.forEach((candidate, order) => {
    if (unique.some((item) => colorDistance(hexToRgb(item.color), hexToRgb(candidate.color)) < 32)) return;
    const ratio = contrastRatio(candidate.color, bgHex);
    const distance = colorDistance(hexToRgb(candidate.color), base.textZone);
    const stylePriority = candidate.role === "高对比"
      ? 44
      : candidate.role === "互补"
        ? 28
        : candidate.role === "柔和"
          ? 20
          : 0;
    const contrastPenalty = ratio < 3.2 ? -60 : 0;
    const score = stylePriority + ratio * 5 + distance / 26 - order * 1.4 + contrastPenalty;
    unique.push({ ...candidate, score, ratio });
  });
  return unique
    .sort((a, b) => b.score - a.score)
    .slice(0, 3)
    .map((item, index) => ({ ...item, label: `推荐 ${index + 1}` }));
}

async function autoMatchTextColor() {
  const recommendations = buildAutoMatchRecommendations(await analyzeAutoMatchBase());
  if (!recommendations.length) return;
  const signature = recommendations.map((item) => item.color.toLowerCase()).join("|");
  if (signature !== state.autoMatchSignature) {
    state.autoMatchIndex = -1;
    state.autoMatchSignature = signature;
  }
  state.autoMatchColors = recommendations;
  state.autoMatchIndex = (state.autoMatchIndex + 1) % recommendations.length;
  setTextColor(recommendations[state.autoMatchIndex].color, { auto: true });
  syncButtons();
}

function estimateBackgroundColor(data, width, height) {
  const buckets = new Map();
  const sample = (x, y) => {
    const index = (Math.max(0, Math.min(height - 1, y)) * width + Math.max(0, Math.min(width - 1, x))) * 4;
    const color = [data[index], data[index + 1], data[index + 2]];
    const key = color.map((value) => Math.round(value / 24)).join(":");
    const bucket = buckets.get(key) || { count: 0, r: 0, g: 0, b: 0 };
    bucket.count += 1;
    bucket.r += color[0];
    bucket.g += color[1];
    bucket.b += color[2];
    buckets.set(key, bucket);
  };
  for (let x = 0; x < width; x += Math.max(1, Math.floor(width / 34))) {
    sample(x, 2);
    sample(x, height - 3);
  }
  for (let y = 0; y < height; y += Math.max(1, Math.floor(height / 34))) {
    sample(2, y);
    sample(width - 3, y);
  }
  const dominant = Array.from(buckets.values()).sort((a, b) => b.count - a.count)[0];
  if (!dominant) return [0, 0, 0];
  return [
    Math.round(dominant.r / dominant.count),
    Math.round(dominant.g / dominant.count),
    Math.round(dominant.b / dominant.count)
  ];
}

function colorDistance(a, b) {
  return Math.hypot(a[0] - b[0], a[1] - b[1], a[2] - b[2]);
}

function edgeConnectedBackground(mask, width, height) {
  const visited = new Uint8Array(width * height);
  const queue = [];
  const push = (x, y) => {
    if (x < 0 || y < 0 || x >= width || y >= height) return;
    const index = y * width + x;
    if (visited[index] || mask[index] !== 0) return;
    visited[index] = 1;
    queue.push(index);
  };
  for (let x = 0; x < width; x += 1) {
    push(x, 0);
    push(x, height - 1);
  }
  for (let y = 0; y < height; y += 1) {
    push(0, y);
    push(width - 1, y);
  }
  for (let i = 0; i < queue.length; i += 1) {
    const index = queue[i];
    const x = index % width;
    const y = Math.floor(index / width);
    push(x + 1, y);
    push(x - 1, y);
    push(x, y + 1);
    push(x, y - 1);
  }
  return visited;
}

function cleanupSubjectMask(seedMask, width, height) {
  const connectedBg = edgeConnectedBackground(seedMask, width, height);
  const filled = new Uint8ClampedArray(seedMask.length);
  for (let i = 0; i < seedMask.length; i += 1) {
    filled[i] = connectedBg[i] ? 0 : 255;
  }
  const cleaned = new Uint8ClampedArray(filled.length);
  for (let y = 0; y < height; y += 1) {
    for (let x = 0; x < width; x += 1) {
      let solid = 0;
      let total = 0;
      for (let oy = -1; oy <= 1; oy += 1) {
        for (let ox = -1; ox <= 1; ox += 1) {
          const sx = x + ox;
          const sy = y + oy;
          if (sx < 0 || sy < 0 || sx >= width || sy >= height) continue;
          total += 1;
          if (filled[sy * width + sx] === 255) solid += 1;
        }
      }
      cleaned[y * width + x] = solid >= Math.max(4, Math.floor(total * 0.56)) ? 255 : 0;
    }
  }
  const feathered = new Uint8ClampedArray(cleaned.length);
  for (let y = 0; y < height; y += 1) {
    for (let x = 0; x < width; x += 1) {
      const index = y * width + x;
      if (cleaned[index] === 0) {
        feathered[index] = 0;
        continue;
      }
      let edge = false;
      for (let oy = -1; oy <= 1 && !edge; oy += 1) {
        for (let ox = -1; ox <= 1; ox += 1) {
          const sx = x + ox;
          const sy = y + oy;
          if (sx < 0 || sy < 0 || sx >= width || sy >= height) continue;
          if (cleaned[sy * width + sx] === 0) {
            edge = true;
            break;
          }
        }
      }
      feathered[index] = edge ? 214 : 255;
    }
  }
  return feathered;
}

async function generateSubjectCutout() {
  if (!state.bgImage) {
    alert("请先上传或启用一张背景图片，再生成自动抠图层。");
    return;
  }
  if (!state.bgImageEnabled) state.bgImageEnabled = true;
  els.autoCutoutLayer.disabled = true;
  els.autoCutoutLayer.textContent = "生成中...";
  try {
    const rect = els.artboard.getBoundingClientRect();
    const image = await loadImage(state.bgImage);
    const canvas = document.createElement("canvas");
    const qualityScale = Math.min(2, Math.max(1, window.devicePixelRatio || 1));
    const baseWidth = Math.max(1, Math.round(rect.width * qualityScale));
    const baseHeight = Math.max(1, Math.round(rect.height * qualityScale));
    const fitScale = Math.max(1, 720 / Math.max(baseWidth, baseHeight));
    canvas.width = Math.round(baseWidth * fitScale);
    canvas.height = Math.round(baseHeight * fitScale);
    const ctx = canvas.getContext("2d");
    const cover = coverRect(image, canvas.width, canvas.height);
    ctx.filter = `brightness(${state.bgBrightness}%)`;
    ctx.drawImage(image, cover.x, cover.y, cover.width, cover.height);
    ctx.filter = "none";
    const frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = frame.data;
    const bg = estimateBackgroundColor(data, canvas.width, canvas.height);
    const centerX = canvas.width / 2;
    const centerY = canvas.height / 2;
    const maxRadius = Math.hypot(centerX, centerY);
    const seedMask = new Uint8ClampedArray(canvas.width * canvas.height);
    for (let y = 0; y < canvas.height; y += 1) {
      for (let x = 0; x < canvas.width; x += 1) {
        const index = (y * canvas.width + x) * 4;
        const pixel = [data[index], data[index + 1], data[index + 2]];
        const distance = colorDistance(pixel, bg);
        const centerBias = 1 - Math.min(1, Math.hypot(x - centerX, y - centerY) / maxRadius);
        const alpha = clamp((distance - 40) * 7.2 + centerBias * 28, 0, 255);
        seedMask[y * canvas.width + x] = alpha > 132 ? 255 : 0;
      }
    }
    const subjectMask = cleanupSubjectMask(seedMask, canvas.width, canvas.height);
    for (let i = 0; i < subjectMask.length; i += 1) {
      data[i * 4 + 3] = subjectMask[i];
    }
    ctx.putImageData(frame, 0, 0);
    state.cutoutImage = canvas.toDataURL("image/png");
    state.cutoutEnabled = true;
    state.transparentBg = false;
  } catch (error) {
    console.error(error);
    alert("自动抠图层生成失败，可以换一张主体更清晰的背景图再试。");
  } finally {
    els.autoCutoutLayer.disabled = false;
    syncValues();
    syncButtons();
    draw();
  }
}

function setHexPair(kind, value) {
  if (!/^#[0-9a-f]{6}$/i.test(value)) return;
  if (kind === "bg") setBackgroundColor(value);
  else if (kind === "textColor") setTextColor(value);
  else {
    state[kind] = value.toLowerCase();
    syncValues();
    draw();
  }
}

function loadImage(src) {
  return new Promise((resolve, reject) => {
    const image = new Image();
    image.onload = () => resolve(image);
    image.onerror = reject;
    image.src = src;
  });
}

function coverRect(image, width, height) {
  const baseScale = Math.max(width / image.naturalWidth, height / image.naturalHeight);
  const scale = baseScale * (state.bgImageScale / 100);
  const drawW = image.naturalWidth * scale;
  const drawH = image.naturalHeight * scale;
  return {
    x: (width - drawW) / 2 + (state.bgImageX / 100) * width * 0.5,
    y: (height - drawH) / 2 + (state.bgImageY / 100) * height * 0.5,
    width: drawW,
    height: drawH
  };
}

function coverRectFromSize(naturalWidth, naturalHeight, width, height) {
  const baseScale = Math.max(width / naturalWidth, height / naturalHeight);
  const scale = baseScale * (state.bgImageScale / 100);
  const drawW = naturalWidth * scale;
  const drawH = naturalHeight * scale;
  return {
    x: (width - drawW) / 2 + (state.bgImageX / 100) * width * 0.5,
    y: (height - drawH) / 2 + (state.bgImageY / 100) * height * 0.5,
    width: drawW,
    height: drawH
  };
}

function brightnessImageDataUrl(image, width, height, rect, brightness) {
  const canvas = document.createElement("canvas");
  canvas.width = Math.max(1, Math.round(width));
  canvas.height = Math.max(1, Math.round(height));
  const ctx = canvas.getContext("2d");
  ctx.filter = `brightness(${brightness}%)`;
  ctx.drawImage(image, rect.x, rect.y, rect.width, rect.height);
  ctx.filter = "none";
  return canvas.toDataURL("image/png");
}

async function paintCanvasBackground(ctx, width, height) {
  if (!state.transparentBg) {
    ctx.fillStyle = state.bg;
    ctx.fillRect(0, 0, width, height);
  }

  if (state.transparentBg || !state.bgImage || !state.bgImageEnabled) return;

  const image = await loadImage(state.bgImage);
  const rect = coverRect(image, width, height);
  ctx.save();
  ctx.filter = `brightness(${state.bgBrightness}%)`;
  ctx.drawImage(image, rect.x, rect.y, rect.width, rect.height);
  ctx.restore();
}

function paintCanvasVignette(ctx, width, height) {
  if (!state.vignetteEnabled || state.transparentBg || state.vignetteStrength <= 0) return;
  const gradient = ctx.createRadialGradient(width / 2, height / 2, Math.min(width, height) * 0.18, width / 2, height / 2, Math.hypot(width, height) * 0.58);
  const opacity = clamp(state.vignetteStrength, 0, 80) / 100;
  gradient.addColorStop(0, "rgba(0,0,0,0)");
  gradient.addColorStop(0.58, "rgba(0,0,0,0)");
  gradient.addColorStop(0.82, `rgba(0,0,0,${opacity * 0.52})`);
  gradient.addColorStop(1, `rgba(0,0,0,${opacity})`);
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, width, height);
}

async function paintCanvasCutout(ctx, width, height) {
  if (!state.cutoutEnabled || !state.cutoutImage || state.transparentBg) return;
  const image = await loadImage(state.cutoutImage);
  ctx.drawImage(image, 0, 0, width, height);
}

async function downloadPng() {
  const rect = els.artboard.getBoundingClientRect();
  const { width, height, scale, outputWidth, outputHeight } = exportPixelSize();
  const scaleX = width / rect.width;
  const scaleY = height / rect.height;
  const shadow = textShadowSettings();
  const canvas = document.createElement("canvas");
  canvas.width = outputWidth;
  canvas.height = outputHeight;
  const ctx = canvas.getContext("2d");
  ctx.scale(scale * scaleX, scale * scaleY);
  await paintCanvasBackground(ctx, rect.width, rect.height);
  paintCanvasVignette(ctx, rect.width, rect.height);

  els.artboard.querySelectorAll(".glyph").forEach((glyph) => {
    if (/^[ \t]+$/.test(glyph.dataset.char || glyph.textContent || "")) return;
    const x = parseFloat(glyph.style.left);
    const y = parseFloat(glyph.style.top);
    const size = parseFloat(glyph.style.fontSize);
    const family = glyph.style.fontFamily || state.fontFamily;
    const strokeWidth = state.strokeEnabled ? state.strokeWidth : 0;
    const boxW = glyph.offsetWidth;
    const boxH = glyph.offsetHeight;
    const cx = x + boxW / 2;
    const cy = y + boxH / 2;
    ctx.font = `${state.fontWeight} ${size}px ${family}`;
    ctx.textAlign = "left";
    ctx.textBaseline = "alphabetic";
    const glyphBox = measureGlyphBox(glyph.textContent, size, family);
    const textX = x + (glyphBox.visualLeft || 0);
    const metrics = ctx.measureText(glyph.textContent);
    const textY = cy + ((metrics.actualBoundingBoxAscent || size * 0.72) - (metrics.actualBoundingBoxDescent || size * 0.2)) / 2;
    if (state.fillEnabled) {
      ctx.fillStyle = state.fillColor;
      ctx.fillRect(x, y, boxW, boxH);
    }
    if (shadow.enabled) {
      ctx.save();
      applyCanvasTextSlant(ctx, cx, cy);
      ctx.fillStyle = shadow.color;
      ctx.shadowColor = shadow.color;
      ctx.shadowBlur = shadow.blur;
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = 0;
      ctx.fillText(glyph.textContent, textX + shadow.x, textY + shadow.y);
      ctx.restore();
    }
    ctx.save();
    applyCanvasTextSlant(ctx, cx, cy);
    if (strokeWidth > 0 && state.textVisible) {
      ctx.strokeStyle = state.strokeColor;
      ctx.lineWidth = strokeWidth;
      ctx.lineJoin = "round";
      ctx.miterLimit = 2;
      ctx.strokeText(glyph.textContent, textX, textY);
    }
    if (state.textVisible) {
      ctx.fillStyle = state.textColor;
      ctx.fillText(glyph.textContent, textX, textY);
    }
    ctx.restore();
  });
  await paintCanvasCutout(ctx, rect.width, rect.height);

  const link = document.createElement("a");
  link.download = "grid-cover.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
}

function escapeXml(value) {
  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;");
}

async function downloadSvg() {
  const rect = els.artboard.getBoundingClientRect();
  const { outputWidth, outputHeight } = exportPixelSize();
  const shadow = textShadowSettings();
  const customFontStyle = customFontDataUrl && state.customFontFamily
    ? `<defs><style>@font-face{font-family:${state.customFontFamily};src:url(${customFontDataUrl});font-weight:100 900;}</style></defs>`
    : "";
  const shadowDefs = shadow.enabled && shadow.blur > 0
    ? `<defs><filter id="textShadowBlur" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB"><feGaussianBlur stdDeviation="${(shadow.blur / 2).toFixed(2)}"/></filter></defs>`
    : "";
  const bgRect = state.transparentBg
    ? ""
    : `<rect width="100%" height="100%" fill="${escapeXml(state.bg)}"/>`;
  let bgImage = "";
  if (state.bgImage && state.bgImageEnabled && !state.transparentBg) {
    const image = await loadImage(state.bgImage);
    const imageRect = coverRectFromSize(image.naturalWidth, image.naturalHeight, rect.width, rect.height);
    const imageHref = state.bgBrightness === 100
      ? state.bgImage
      : brightnessImageDataUrl(image, rect.width, rect.height, imageRect, state.bgBrightness);
    bgImage = state.bgBrightness === 100
      ? `<image xlink:href="${escapeXml(imageHref)}" x="${imageRect.x.toFixed(2)}" y="${imageRect.y.toFixed(2)}" width="${imageRect.width.toFixed(2)}" height="${imageRect.height.toFixed(2)}" preserveAspectRatio="none"/>`
      : `<image xlink:href="${escapeXml(imageHref)}" x="0" y="0" width="${rect.width.toFixed(2)}" height="${rect.height.toFixed(2)}" preserveAspectRatio="none"/>`;
  }
  const vignette = state.vignetteEnabled && !state.transparentBg && state.vignetteStrength > 0
    ? `<defs><radialGradient id="vignette" cx="50%" cy="50%" r="72%"><stop offset="0%" stop-color="#000" stop-opacity="0"/><stop offset="54%" stop-color="#000" stop-opacity="0"/><stop offset="82%" stop-color="#000" stop-opacity="${(state.vignetteStrength / 190).toFixed(3)}"/><stop offset="100%" stop-color="#000" stop-opacity="${(state.vignetteStrength / 100).toFixed(3)}"/></radialGradient></defs><rect width="100%" height="100%" fill="url(#vignette)"/>`
    : "";
  const cutout = state.cutoutEnabled && state.cutoutImage && !state.transparentBg
    ? `<image xlink:href="${escapeXml(state.cutoutImage)}" x="0" y="0" width="${rect.width.toFixed(2)}" height="${rect.height.toFixed(2)}" preserveAspectRatio="none"/>`
    : "";
  const glyphs = Array.from(els.artboard.querySelectorAll(".glyph")).map((glyph) => {
    if (/^[ \t]+$/.test(glyph.dataset.char || glyph.textContent || "")) return "";
    const x = parseFloat(glyph.style.left);
    const y = parseFloat(glyph.style.top);
    const size = parseFloat(glyph.style.fontSize);
    const family = escapeXml(glyph.style.fontFamily || state.fontFamily);
    const fill = state.textVisible ? state.textColor : "transparent";
    const strokeWidth = state.strokeEnabled ? state.strokeWidth : 0;
    const boxW = glyph.offsetWidth;
    const boxH = glyph.offsetHeight;
    const cx = x + boxW / 2;
    const cy = y + boxH / 2;
    glyphMeasureContext.font = `${state.fontWeight} ${size}px ${glyph.style.fontFamily || state.fontFamily}`;
    const glyphBox = measureGlyphBox(glyph.textContent, size, glyph.style.fontFamily || state.fontFamily);
    const textX = x + (glyphBox.visualLeft || 0);
    const metrics = glyphMeasureContext.measureText(glyph.textContent || " ");
    const textY = cy + ((metrics.actualBoundingBoxAscent || size * 0.72) - (metrics.actualBoundingBoxDescent || size * 0.2)) / 2;
    const fillRect = state.fillEnabled ? `<rect x="${x.toFixed(2)}" y="${y.toFixed(2)}" width="${boxW.toFixed(2)}" height="${boxH.toFixed(2)}" fill="${escapeXml(state.fillColor)}"/>` : "";
    const textBase = `x="${textX.toFixed(2)}" y="${textY.toFixed(2)}" text-anchor="start" dominant-baseline="alphabetic" font-family="${family}" font-size="${size.toFixed(2)}" font-weight="${state.fontWeight}"`;
    const shadowBase = `x="${(textX + shadow.x).toFixed(2)}" y="${(textY + shadow.y).toFixed(2)}" text-anchor="start" dominant-baseline="alphabetic" font-family="${family}" font-size="${size.toFixed(2)}" font-weight="${state.fontWeight}"`;
    const slant = renderSlant();
    const textTransform = slant ? ` transform="translate(${cx.toFixed(2)} ${cy.toFixed(2)}) skewX(${slant}) translate(${-cx.toFixed(2)} ${-cy.toFixed(2)})"` : "";
    const shadowFilter = shadow.enabled && shadow.blur > 0 ? ` filter="url(#textShadowBlur)"` : "";
    const shadowText = shadow.enabled ? `<text ${shadowBase} fill="#000000" fill-opacity="${shadow.opacity.toFixed(3)}"${shadowFilter}>${escapeXml(glyph.textContent)}</text>` : "";
    const strokeText = strokeWidth > 0 && state.textVisible ? `<text ${textBase} fill="transparent" stroke="${escapeXml(state.strokeColor)}" stroke-width="${strokeWidth}" stroke-linejoin="round" stroke-miterlimit="2">${escapeXml(glyph.textContent)}</text>` : "";
    const fillText = `<text ${textBase} fill="${escapeXml(fill)}">${escapeXml(glyph.textContent)}</text>`;
    const textLayer = textTransform ? `<g${textTransform}>${shadowText}${strokeText}${fillText}</g>` : `${shadowText}${strokeText}${fillText}`;
    return `${fillRect}${textLayer}`;
  }).join("");
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="${outputWidth}" height="${outputHeight}" viewBox="0 0 ${rect.width.toFixed(2)} ${rect.height.toFixed(2)}">${customFontStyle}${shadowDefs}${bgRect}${bgImage}${vignette}${glyphs}${cutout}</svg>`;
  const blob = new Blob([svg], { type: "image/svg+xml;charset=utf-8" });
  const link = document.createElement("a");
  link.download = "grid-cover.svg";
  link.href = URL.createObjectURL(blob);
  link.click();
  URL.revokeObjectURL(link.href);
}

function boot() {
  state.text = els.textInput.value;
  updateBoardSize();
  syncFormFromState();
  syncValues();
  syncButtons();
  syncInitialPanels();
  draw();


  els.artboard.addEventListener("pointerdown", startMarqueeSelection);

  els.gridPicker.addEventListener("mousedown", (event) => {
    event.preventDefault();
  });
  document.addEventListener("keydown", (event) => {
    const isUndo = (event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "z" && !event.shiftKey;
    if (!isUndo) return;
    event.preventDefault();
    undo();
  });

  els.globalReset.addEventListener("click", () => {
    pushHistory();
    resetAll();
  });

  [els.canvasWidth, els.canvasHeight].forEach((input) => {
    input.addEventListener("input", () => {
      state.aspectPreset = "custom";
      els.aspectPreset.value = "custom";
    });
    input.addEventListener("blur", commitCanvasSizeInputs);
    input.addEventListener("keydown", (event) => {
      if (event.key !== "Enter") return;
      event.preventDefault();
      commitCanvasSizeInputs();
      input.blur();
    });
  });

  els.aspectPreset.addEventListener("change", () => {
    pushHistory();
    applyAspectPreset(els.aspectPreset.value);
  });

  els.textInput.addEventListener("input", () => {
    pushHistory();
    state.text = els.textInput.value;
    state.manual.clear();

    clearSelectionState();
    state.free = false;
    syncButtons();
    draw();
  });

  els.gridPicker.addEventListener("click", (event) => {
    const button = event.target.closest("button[data-anchor]");
    if (!button) return;
    pushHistory();
    button.blur();
    state.anchor = Number(button.dataset.anchor);
    state.free = false;
    state.manual.clear();

    clearSelectionState();
    syncButtons();
    draw();
  });

  els.freeMode.addEventListener("click", () => {
    pushHistory();
    state.free = !state.free;
    syncButtons();
    draw();
  });

  els.fontFamily.addEventListener("change", () => {
    pushHistory();
    state.fontFamily = els.fontFamily.value;
    state.fontWeight = 700;
    state.manual.clear();
    clearSelectionState();
    syncValues();
    syncButtons();
    draw();
  });

  els.customFontButton.addEventListener("click", () => {
    els.customFontInput.click();
  });

  els.customFontInput.addEventListener("change", async () => {
    const file = els.customFontInput.files && els.customFontInput.files[0];
    if (!file) return;
    pushHistory();
    await loadCustomFont(file);
  });

  els.fontWeightPicker.addEventListener("click", (event) => {
    const button = event.target.closest("button[data-weight]");
    if (!button) return;
    pushHistory();
    state.fontWeight = Number(button.dataset.weight);
    state.manual.clear();
    clearSelectionState();
    syncButtons();
    draw();
  });

  els.sizeControl.addEventListener("input", () => {
    pushHistory();
    state.size = Number(els.sizeControl.value);
    state.manual.clear();

    clearSelectionState();
    syncValues();
    draw();
  });


  els.sizeValue.addEventListener("input", () => {
    pushHistory();
    state.size = clamp(Number(els.sizeValue.value) || defaults.size, 48, 240);
    els.sizeControl.value = state.size;
    state.manual.clear();
    clearSelectionState();
    syncValues();
    draw();
  });
  els.spacingControl.addEventListener("input", () => {
    pushHistory();
    state.letterSpacing = Number(els.spacingControl.value);
    state.manual.clear();

    clearSelectionState();
    syncValues();
    draw();
  });


  els.spacingValue.addEventListener("input", () => {
    pushHistory();
    state.letterSpacing = clamp(Number(els.spacingValue.value) || 0, -10, 90);
    els.spacingControl.value = state.letterSpacing;
    state.manual.clear();
    clearSelectionState();
    syncValues();
    draw();
  });
  els.lineHeightControl.addEventListener("input", () => {
    pushHistory();
    state.lineHeight = Number(els.lineHeightControl.value) / 100;
    state.manual.clear();

    clearSelectionState();
    syncValues();
    draw();
  });


  els.lineHeightValue.addEventListener("input", () => {
    pushHistory();
    const value = clamp(Number(els.lineHeightValue.value) || 112, 70, 160);
    state.lineHeight = value / 100;
    els.lineHeightControl.value = value;
    state.manual.clear();
    clearSelectionState();
    syncValues();
    draw();
  });

  els.fontSlant.addEventListener("input", () => {
    pushHistory();
    setFontSlant(els.fontSlant.value);
    syncValues();
    draw();
  });

  els.fontSlantValue.addEventListener("input", () => {
    pushHistory();
    setFontSlant(els.fontSlantValue.value);
    syncValues();
    draw();
  });
  els.textInkToggle.addEventListener("click", () => {
    pushHistory();
    setTextColor(state.textColor.toLowerCase() === "#050505" ? "#ffffff" : "#050505");
  });

  els.textColorPicker.addEventListener("input", () => {
    pushHistory();
    setTextColor(els.textColorPicker.value);
  });

  els.textColorHex.addEventListener("input", () => {
    pushHistory();
    setTextColor(els.textColorHex.value.trim());
  });

  els.autoTextColor.addEventListener("click", async () => {
    pushHistory();
    await autoMatchTextColor();
  });

  els.bgColor.addEventListener("input", () => {
    pushHistory();
    setBackgroundColor(els.bgColor.value);
  });

  els.bgHex.addEventListener("input", () => {
    pushHistory();
    setHexPair("bg", els.bgHex.value.trim());
  });

  els.randomBgColor.addEventListener("click", () => {
    pushHistory();
    setBackgroundColor(randomColor());
  });

  els.bgToggleBW.addEventListener("click", () => {
    pushHistory();
    setBackgroundColor(state.bg.toLowerCase() === "#ffffff" ? "#000000" : "#ffffff");
  });

  els.bgImageButton.addEventListener("click", () => els.bgImageInput.click());

  els.bgImageInput.addEventListener("change", () => {
    const file = els.bgImageInput.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.addEventListener("load", () => {
      pushHistory();
      state.bgImage = String(reader.result);
      state.bgImageEnabled = true;
      state.cutoutEnabled = false;
      state.cutoutImage = "";
      state.transparentBg = false;
      state.bgImageScale = 100;
      state.bgImageX = 0;
      state.bgImageY = 0;
      draw();
      syncValues();
    });
    reader.readAsDataURL(file);
  });

  els.bgImageEnabled.addEventListener("change", () => {
    pushHistory();
    state.bgImageEnabled = Boolean(state.bgImage) && els.bgImageEnabled.checked;
    if (state.bgImageEnabled) state.transparentBg = false;
    syncValues();
    draw();
  });


  function setBgImageAxis(key, value) {
    pushHistory();
    state[key] = key === "bgImageScale" ? clamp(Number(value) || 100, 50, 220) : clamp(Number(value) || 0, -100, 100);
    syncValues();
    draw();
  }

  els.bgImageScale.addEventListener("input", () => setBgImageAxis("bgImageScale", els.bgImageScale.value));
  els.bgImageScaleValue.addEventListener("input", () => setBgImageAxis("bgImageScale", els.bgImageScaleValue.value));
  els.bgImageX.addEventListener("input", () => setBgImageAxis("bgImageX", els.bgImageX.value));
  els.bgImageXValue.addEventListener("input", () => setBgImageAxis("bgImageX", els.bgImageXValue.value));
  els.bgImageY.addEventListener("input", () => setBgImageAxis("bgImageY", els.bgImageY.value));
  els.bgImageYValue.addEventListener("input", () => setBgImageAxis("bgImageY", els.bgImageYValue.value));

  els.bgBrightness.addEventListener("input", () => {
    pushHistory();
    state.bgBrightness = Number(els.bgBrightness.value);
    syncValues();
    draw();
  });

  els.bgBrightnessValue.addEventListener("input", () => {
    pushHistory();
    state.bgBrightness = clamp(Number(els.bgBrightnessValue.value) || 100, 20, 180);
    syncValues();
    draw();
  });

  els.autoCutoutLayer.addEventListener("click", () => {
    pushHistory();
    if (state.cutoutEnabled) {
      state.cutoutEnabled = false;
      syncValues();
      syncButtons();
      draw();
      return;
    }
    generateSubjectCutout();
  });

  els.resetBgImageFit.addEventListener("click", () => {
    pushHistory();
    resetBackgroundImageFit();
  });

  els.vignetteToggle.addEventListener("click", () => {
    pushHistory();
    state.vignetteEnabled = !state.vignetteEnabled;
    syncValues();
    syncButtons();
    draw();
  });

  els.vignetteStrength.addEventListener("input", () => {
    pushHistory();
    state.vignetteStrength = clamp(Number(els.vignetteStrength.value) || 0, 0, 80);
    if (state.vignetteStrength > 0) state.vignetteEnabled = true;
    syncValues();
    syncButtons();
    draw();
  });

  els.vignetteStrengthValue.addEventListener("input", () => {
    pushHistory();
    state.vignetteStrength = clamp(Number(els.vignetteStrengthValue.value) || 0, 0, 80);
    if (state.vignetteStrength > 0) state.vignetteEnabled = true;
    syncValues();
    syncButtons();
    draw();
  });

  els.transparentBg.addEventListener("change", () => {
    pushHistory();
    setTransparentBackground(els.transparentBg.checked);
  });

  els.textToggle.addEventListener("click", () => {
    pushHistory();
    state.textVisible = !state.textVisible;
    syncButtons();
    draw();
  });

  els.pulseToggle.addEventListener("click", () => {
    pushHistory();
    state.live = !state.live;
    syncButtons();
  });

  els.randomTextColor.addEventListener("click", () => {
    pushHistory();
    state.textColor = randomColor();
    state.autoMatchIndex = -1;
    state.autoMatchSignature = "";
    syncValues();
    draw();
  });

  els.strokeInkToggle.addEventListener("click", () => {
    pushHistory();
    state.strokeColor = state.strokeColor.toLowerCase() === "#000000" ? "#ffffff" : "#000000";
    state.strokeWidth = 2;
    syncValues();
    syncButtons();
    draw();
  });

  els.strokeRandom.addEventListener("click", () => {
    pushHistory();
    state.strokeColor = randomColor();
    if (state.strokeWidth === 0) state.strokeWidth = 2;
    syncValues();
    syncButtons();
    draw();
  });

  els.fillToggle.addEventListener("click", () => {
    pushHistory();
    state.fillEnabled = !state.fillEnabled;
    syncValues();
    syncButtons();
    draw();
  });

  els.fillRandom.addEventListener("click", () => {
    pushHistory();
    state.fillEnabled = true;
    state.fillColor = randomColor();
    syncValues();
    syncButtons();
    draw();
  });

  els.strokeColor.addEventListener("input", () => {
    pushHistory();
    if (state.strokeWidth === 0) state.strokeWidth = 2;
    setHexPair("strokeColor", els.strokeColor.value);
    syncButtons();
  });
  els.strokeHex.addEventListener("input", () => {
    pushHistory();
    if (/^#[0-9a-f]{6}$/i.test(els.strokeHex.value.trim()) && state.strokeWidth === 0) state.strokeWidth = 2;
    setHexPair("strokeColor", els.strokeHex.value.trim());
    syncButtons();
  });
  els.fillColor.addEventListener("input", () => {
    pushHistory();
    state.fillEnabled = true;
    setHexPair("fillColor", els.fillColor.value);
    syncButtons();
  });
  els.fillHex.addEventListener("input", () => {
    pushHistory();
    if (/^#[0-9a-f]{6}$/i.test(els.fillHex.value.trim())) state.fillEnabled = true;
    setHexPair("fillColor", els.fillHex.value.trim());
    syncButtons();
  });

  els.strokeWidth.addEventListener("input", () => {
    pushHistory();
    state.strokeWidth = Number(els.strokeWidth.value);
    syncValues();
    syncButtons();
    draw();
  });

  els.strokeWidthNumber.addEventListener("input", () => {
    pushHistory();
    state.strokeWidth = Math.max(0, Math.min(24, Number(els.strokeWidthNumber.value) || 0));
    syncValues();
    syncButtons();
    draw();
  });

  els.shadowToggle.addEventListener("click", () => {
    pushHistory();
    state.shadowEnabled = !state.shadowEnabled;
    syncValues();
    syncButtons();
    draw();
  });

  function bindShadowControl(rangeEl, numberEl, key, min, max) {
    const update = (rawValue) => {
      pushHistory();
      state[key] = clamp(Number(rawValue) || 0, min, max);
      if (state[key] > 0 && key !== "shadowAngle") state.shadowEnabled = true;
      syncValues();
      syncButtons();
      draw();
    };
    rangeEl.addEventListener("input", () => update(rangeEl.value));
    numberEl.addEventListener("input", () => update(numberEl.value));
  }

  bindShadowControl(els.shadowSize, els.shadowSizeValue, "shadowSize", 0, 80);
  bindShadowControl(els.shadowAngle, els.shadowAngleValue, "shadowAngle", 0, 360);
  bindShadowControl(els.shadowOpacity, els.shadowOpacityValue, "shadowOpacity", 0, 100);
  bindShadowControl(els.shadowBlur, els.shadowBlurValue, "shadowBlur", 0, 80);

  els.glyphScale.addEventListener("input", () => {
    pushHistory();
    setSelectedGlyphScale(Number(els.glyphScale.value));
  });

  els.glyphScaleNumber.addEventListener("input", () => {
    pushHistory();
    setSelectedGlyphScale(clamp(Number(els.glyphScaleNumber.value) || 100, 10, 500));
  });

  els.scalePicker.addEventListener("click", (event) => {
    const button = event.target.closest("button[data-scale]");
    if (!button) return;
    pushHistory();
    state.exportScale = Number(button.dataset.scale);
    syncButtons();
    updateExportSizeHint();
  });

  els.downloadPng.addEventListener("click", downloadPng);
  els.downloadSvg.addEventListener("click", downloadSvg);
  els.downloadMp4.addEventListener("click", exportMp4Notice);

  document.querySelectorAll("[data-collapse]").forEach((button) => {
    button.addEventListener("click", () => {
      const block = button.closest(".panel-block");
      const collapsed = block.classList.toggle("collapsed");
      button.setAttribute("aria-expanded", String(!collapsed));
      button.blur();
      requestAnimationFrame(() => button.blur());
    });
  });

  window.addEventListener("resize", () => {
    updateBoardSize();
    state.manual.clear();

    clearSelectionState();
    draw();
  });

  function animate() {
    state.tick += 1;
    if (state.live) draw();
    requestAnimationFrame(animate);
  }

  requestAnimationFrame(animate);
}

function syncInitialPanels() {
  const openPanels = new Set(["textPanel", "fontPanel"]);
  document.querySelectorAll("[data-collapse]").forEach((button) => {
    const panelId = button.dataset.collapse;
    const block = button.closest(".panel-block");
    const collapsed = !openPanels.has(panelId);
    block?.classList.toggle("collapsed", collapsed);
    button.setAttribute("aria-expanded", String(!collapsed));
  });
}

boot();


</script>
</body>
</html>
